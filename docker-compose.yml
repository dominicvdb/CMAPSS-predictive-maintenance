services:
  postgres:
    image: postgres:16
    container_name: assetpulse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: assetpulse-mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MLFLOW_ARTIFACTS_DESTINATION: /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      sh -c 'mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri "$${MLFLOW_BACKEND_STORE_URI}"
      --artifacts-destination "$${MLFLOW_ARTIFACTS_DESTINATION}"'

volumes:
  postgres_data:
  mlflow_artifacts:
